name: Auto-merge

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - master

permissions:
  id-token: write
  contents: write
  pull-requests: write

concurrency:
  group: auto-merge-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  auto-merge:
    uses: peavers-code/peavers-warcraft-workflows/.github/workflows/auto-merge.yml@master
    with:
      allowed_user: "peavers-data-scrapers[bot]"
      use_self_hosted: true
    secrets: inherit
