name: Cleanup Old Releases

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

permissions:
  id-token: write
  contents: write
  actions: write

jobs:
  cleanup-releases:
    uses: peavers-code/peavers-warcraft-workflows/.github/workflows/cleanup-releases.yml@master
    with:
      use_self_hosted: true
    secrets: inherit
